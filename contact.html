    <header class="header-section">
        <h1>Get Your Free Website Demo</h1>
        <p>Fill out the form below and we will review your current online presence.</p>
    </header>

    <section>
        <form id="contactForm">
            <input type="text" placeholder="Full Name" required>
            <input type="text" placeholder="Business Name" required>
            <input type="tel" placeholder="Phone Number" required>
            <input type="email" placeholder="Email Address" required>
            <textarea rows="5" placeholder="Tell us about your shop..."></textarea>
            <button type="submit" class="btn btn-gold">Request My Demo</button>
        </form>
        <p class="center" style="margin-top: 20px;">Or call us directly at <strong>[your number]</strong></p>
    </section>

    <script src="script.js"></script>
